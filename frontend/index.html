<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GoF 디자인 패턴 - Java Spring Boot</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
</head>
<body>
  <div class="app">

    <!-- ── 사이드바 ── -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">GoF</div>
        <div>
          <div class="brand-title">디자인 패턴</div>
          <div class="brand-sub">Java Spring Boot</div>
        </div>
      </div>

      <div class="search-wrap">
        <div class="search-input-group">
          <span class="search-icon">🔍</span>
          <input
            id="searchInput"
            type="text"
            placeholder="패턴 검색..."
            autocomplete="off"
          />
        </div>
        <button id="searchBtn" class="btn-search">검색</button>
      </div>

      <div id="patternList" class="pattern-list">
        <!-- JS로 채워짐 -->
      </div>
    </aside>

    <!-- ── 메인 콘텐츠 ── -->
    <main class="main">

      <!-- 환영 화면 -->
      <div id="welcomeView" class="view welcome-view">
        <div class="welcome-glyph">◈</div>
        <h2>패턴을 선택하거나 검색하세요</h2>
        <p>GoF 23개 디자인 패턴의 Java Spring Boot 예제를 확인할 수 있습니다.</p>
        <div class="welcome-info">
          <div class="info-item">
            <span class="info-icon">📦</span>
            <span>GoF 23개 패턴 예제가 사전 탑재되어 즉시 확인할 수 있습니다</span>
          </div>
          <div class="info-item">
            <span class="info-icon">🏗️</span>
            <span>contract / application / domain / infra / presentation 레이어 기반</span>
          </div>
          <div class="info-item">
            <span class="info-icon">☕</span>
            <span>Java Spring Boot 실무 중심 예제 코드</span>
          </div>
        </div>
      </div>

      <!-- 로딩 화면 -->
      <div id="loadingView" class="view loading-view" style="display:none">
        <div class="spinner"></div>
        <p class="loading-title">예제를 불러오는 중입니다</p>
      </div>

      <!-- 결과 화면 -->
      <div id="resultView" class="view result-view" style="display:none">
        <!-- JS로 채워짐 -->
      </div>

    </main>
  </div>

  <!-- ── 전체화면 오버레이 (정적 배치) ── -->
  <div id="codeFullscreenOverlay" class="fs-overlay" style="display:none">
    <div class="fs-header">
      <div class="fs-title">
        <span class="fs-title-label">예제 코드</span>
        <span id="fsPatternName" class="fs-title-pattern"></span>
        <span class="fs-lang-badge">Java · Spring Boot</span>
      </div>
      <div class="fs-actions">
        <button id="btnFsCopy" class="btn-copy fs-copy-btn">복사</button>
        <button id="btnFsClose" class="fs-close-btn">✕ 닫기</button>
      </div>
    </div>
    <div class="fs-body">
      <pre class="fs-pre"><code class="language-java" id="fsCodeBlock"></code></pre>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
